<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Trajectory Not Found</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Tailwind Configuration -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        darkbg: "#0B0710",
                        darknav: "rgba(11, 7, 16, 0.85)",
                        darkcard: "#190F26",
                        darkcardborder: "rgba(124, 58, 237, 0.2)",
                        accent: "#FACC15",
                        accent2: "#EAB308",
                        textmain: "#F3F4F6",
                        textmuted: "#A78BFA"
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        space: ['Space Grotesk', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    
    <!-- Core CSS overrides -->
    <style type="text/tailwindcss">
        @layer base {
            body {
                @apply bg-darkbg text-textmain font-sans antialiased;
                background-image: radial-gradient(circle at 15% 50%, rgba(124, 58, 237, 0.08) 0%, transparent 50%),
                                  radial-gradient(circle at 85% 30%, rgba(250, 204, 21, 0.03) 0%, transparent 50%);
                background-attachment: fixed;
            }
        }

        @layer components {
            .nav-link {
                @apply text-sm font-medium text-textmuted hover:text-accent transition-colors duration-200;
            }
            .btn-primary {
                @apply bg-accent text-[#0B0710] px-8 py-3.5 font-space font-bold tracking-wide transition-all duration-300 shadow-lg shadow-accent/20 hover:bg-accent2 hover:shadow-accent/40 hover:-translate-y-0.5 text-center cursor-pointer inline-flex items-center justify-center gap-3;
                border-radius: 9999px;
            }
        }
        
        #mobile-menu {
            transition: opacity 0.3s ease, transform 0.3s ease;
        }
        .menu-hidden {
            opacity: 0;
            pointer-events: none;
            transform: translateY(-10px);
        }
        .menu-visible {
            opacity: 1;
            pointer-events: auto;
            transform: translateY(0);
        }
    </style>
</head>
<body class="relative overflow-x-hidden selection:bg-accent/30 selection:text-white">

    <!-- Navigation -->
    <header class="fixed top-0 w-full z-50 transition-all duration-300 border-b border-darkcardborder bg-darknav backdrop-blur-md">
        <div class="container mx-auto px-6 h-20 flex items-center justify-between">
            <a href="index.html" class="text-xl font-space font-bold tracking-tight text-white flex items-center gap-3">
                <div class="w-9 h-9 rounded-full bg-accent flex items-center justify-center font-space text-[#0f0a18] font-bold text-lg leading-none shadow-[0_0_15px_rgba(250,204,21,0.3)]">A</div>
                AHMED ASL
            </a>
            
            <nav class="hidden md:flex items-center gap-8">
                <a href="index.html#services" class="nav-link">Expertise</a>
                <a href="index.html#tutorials" class="nav-link">Tutorials</a>
                <a href="index.html#projects" class="nav-link">Projects</a>
                <a href="index.html#about" class="nav-link">About</a>
                <a href="index.html#contact" class="btn-primary !px-6 !py-2 !text-sm"><i class="fa-solid fa-envelope"></i> Contact</a>
            </nav>

            <button id="menu-toggle" class="md:hidden text-textmuted hover:text-white focus:outline-none">
                <i class="fas fa-bars text-2xl"></i>
            </button>
        </div>
        
        <div id="mobile-menu" class="menu-hidden absolute top-20 left-0 w-full bg-darknav border-b border-darkcardborder backdrop-blur-md md:hidden flex flex-col items-center py-6 gap-6 shadow-2xl">
            <a href="index.html#services" class="nav-link mobile-link text-lg">Expertise</a>
            <a href="index.html#tutorials" class="nav-link mobile-link text-lg">Tutorials</a>
            <a href="index.html#projects" class="nav-link mobile-link text-lg">Projects</a>
            <a href="index.html#about" class="nav-link mobile-link text-lg">About</a>
        </div>
    </header>

    <!-- 404 Hero Section -->
    <section class="min-h-screen flex flex-col items-center justify-center relative px-6 text-center">
        <!-- Cythuliu Background Ambient Glow -->
        <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[600px] h-[600px] bg-accent/10 rounded-full blur-[100px] pointer-events-none z-0"></div>
        <div class="absolute top-1/3 left-1/4 w-[400px] h-[400px] bg-[#3c2858]/30 rounded-full blur-[120px] pointer-events-none z-0"></div>

        <div class="relative z-10 flex flex-col items-center max-w-2xl">
            <!-- Glitchy or Big 404 -->
            <h1 class="font-space text-[8rem] sm:text-[10rem] md:text-[14rem] font-bold leading-none text-transparent bg-clip-text bg-gradient-to-b from-white to-[#3c2858] mb-2 drop-shadow-[0_0_35px_rgba(250,204,21,0.15)]">
                404
            </h1>
            
            <div class="inline-block mb-10 px-6 py-2 rounded-full bg-[#190F26] border border-[#3c2858] text-accent font-bold text-sm tracking-widest uppercase shadow-[0_0_15px_rgba(250,204,21,0.1)]">
                Trajectory Lost
            </div>

            <p class="text-xl md:text-2xl text-textmuted mb-12 font-light">
                The hardware architecture or network protocol you're searching for does not seem to exist in this sector.
            </p>

            <a href="index.html" class="btn-primary text-lg px-12 py-4">
                <i class="fa-solid fa-satellite-dish"></i> Re-Establish Connection
            </a>
        </div>
    </section>

    <!-- Simple Mobile Menu Script -->
    <script>
        const menuToggle = document.getElementById('menu-toggle');
        const mobileMenu = document.getElementById('mobile-menu');
        const mobileLinks = document.querySelectorAll('.mobile-link');
        
        function toggleMenu() {
            mobileMenu.classList.toggle('menu-hidden');
            mobileMenu.classList.toggle('menu-visible');
        }
        
        menuToggle.addEventListener('click', toggleMenu);
        mobileLinks.forEach(link => {
            link.addEventListener('click', toggleMenu);
        });
    </script>
</body>
</html>
